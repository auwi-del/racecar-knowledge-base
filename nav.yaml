# ============================================================================
# Nav2 导航栈参数配置文件 — davinci-mini 差速轮式机器人
# ============================================================================
# 适用: ROS2 Humble / Nav2
# 机器人: 差速轮 + 舵机转向, 半径 ~0.6m
# 定位: AMCL + robot_localization EKF
# 规划: SmacPlannerHybrid (Reeds-Shepp)
# 控制: Regulated Pure Pursuit
#
# 官方文档索引:
#   AMCL:     https://docs.nav2.org/configuration/packages/configuring-amcl.html
#   BT-Nav:   https://docs.nav2.org/configuration/packages/configuring-bt-navigator.html
#   Smac:     https://docs.nav2.org/configuration/packages/smac/
#   RPP:      https://github.com/ros-navigation/navigation2/blob/humble/nav2_regulated_pure_pursuit_controller/README.md
#   Costmap:  https://docs.nav2.org/configuration/packages/costmap-plugins/index.html
#   Waypoint: https://docs.nav2.org/configuration/packages/configuring-waypoint-follower.html
# ============================================================================


# ---------------------------------------------------------------------------
# AMCL — 自适应蒙特卡洛定位
# 功能: 在已知地图上, 结合激光+里程计, 用粒子滤波估算机器人位姿
# 订阅: /scan
# 发布: map→odom_combined TF
# ---------------------------------------------------------------------------
amcl:
  ros__parameters:
    use_sim_time: False

    # ---- 运动模型噪声 (里程计误差方差) ----
    # 这些参数描述里程计读数的不确定性, 值越大 = 粒子越分散 = 定位越"不信任"里程计
    alpha1: 0.2   # 旋转分量中, 由旋转产生的角速度噪声
    alpha2: 0.2   # 旋转分量中, 由平移产生的角速度噪声 (左右偏差)
    alpha3: 0.2   # 平移分量中, 由平移产生的线速度噪声 (前进方向)
    alpha4: 0.2   # 平移分量中, 由旋转产生的线速度噪声 (斜向偏差)
    alpha5: 0.2   # 【仅 Omni 全向模型】平移噪声, 差速机器人不生效

    base_frame_id: "base_footprint"
    global_frame_id: "map"
    odom_frame_id: "odom_combined"

    # ---- 激光模型: 似然场 (likelihood_field) ----
    # 使用哪种激光观测模型
    laser_model_type: "likelihood_field"
    # 激光扫描最大/最小范围 (米), -1 表示使用激光雷达自身报告的值
    laser_max_range: 100.0
    laser_min_range: 0.1
    # 似然场中障碍物膨胀的最大距离 — 用于计算每个粒子的观测似然
    laser_likelihood_max_dist: 2.0
    # 每次滤波器更新时, 从一帧激光中均匀采样的光束数
    max_beams: 60

    # ---- 似然场模型的权重分量 ----
    # z_hit:  命中模型 — 测量值与地图匹配时的权重
    # z_short: 短距离模型 — 遇到意料之外的近处障碍 (如人) 时的权重
    # z_rand: 随机模型 — 完全随机的测量噪声权重
    # sigma_hit: 命中模型中高斯分布的标准差
    # lambda_short: 短距离模型中指数衰减的衰减率
    # 【注意】文件中有两处 sigma_hit, 后面的 0.02 覆盖前面的 0.2
    z_hit: 0.7
    z_short: 0.24
    z_rand: 0.059
    sigma_hit: 0.02        # ← 生效值 (文件中第二个定义)
    lambda_short: 0.1

    # ---- 波束跳过 (beamskip) ----
    # 在动态环境中跳过部分激光束以防止定位退化
    # 当前配置: 已禁用 (do_beamskip: false), 以下参数实际不生效
    do_beamskip: false
    beam_skip_distance: 0.4          # 跳过光束的最大距离
    beam_skip_error_threshold: 0.9   # 地图失配超过此比例时强制完全更新
    beam_skip_threshold: 0.3         # 触发跳过的光束百分比阈值

    # ---- 粒子滤波器参数 ----
    min_particles: 500       # 最小粒子数
    max_particles: 2000      # 最大粒子数
    pf_err: 0.05             # 粒子滤波器误差阈值
    pf_z: 0.99               # 粒子滤波器高斯随机数参数 (z 值)
    resample_interval: 1     # 每次滤波器更新后是否重采样 (1 = 每次都重采样)

    # ---- 恢复行为 ----
    # 当 fast 权重远小于 slow 权重时, 说明粒子退化, 自动注入随机粒子
    # 两个值都设为 0.0 = 禁用恢复 (不自动注入随机粒子)
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0

    # ---- 滤波器更新触发阈值 ----
    # 机器人移动超过以下阈值时才进行滤波器更新 (节省算力)
    update_min_a: 0.06       # 旋转角度变化 (弧度)
    update_min_d: 0.025      # 平移距离变化 (米)

    # ---- 其他 ----
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5      # 将最新位姿持久化到参数服务器的频率 (Hz)
    tf_broadcast: true       # 发布 map → odom_combined TF
    transform_tolerance: 0.3 # TF 变换的容忍延时 (秒)
    scan_topic: /scan

    # ---- 初始位姿 ----
    set_initial_pose: true   # 从参数设置初始位姿, 而非等待 initialpose 话题消息
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

amcl_map_client:
  ros__parameters:
    use_sim_time: False

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: False


# ---------------------------------------------------------------------------
# BT Navigator — 行为树导航
# 功能: 通过行为树编排"全局规划→路径跟踪→完成"的导航流程
# ---------------------------------------------------------------------------
bt_navigator:
  ros__parameters:
    use_sim_time: False
    transform_tolerance: 0.1     # TF 变换容忍延时 (秒)
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: odom_combined
    bt_loop_duration: 10         # 行为树主循环周期 (毫秒)
    default_server_timeout: 20   # 等待 BT 动作服务器响应的超时时间 (毫秒)
    goal_reached_tol: 0.6        # 判定到达目标点的位置容差 (米)

    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: False


# ---------------------------------------------------------------------------
# Controller Server — 局部路径跟踪控制器
# 功能: 接收全局规划路径, 计算实际速度指令 (/cmd_vel)
# 插件: nav2_regulated_pure_pursuit_controller (RegulatedPurePursuitController)
# ---------------------------------------------------------------------------
controller_server:
  ros__parameters:
    # 【注意】非仿真环境, 不应为 True
    use_sim_time: False
    controller_frequency: 20.0            # 控制循环频率 (Hz)
    odom_topic: odom_combined

    # 速度死区阈值 — 小于此值的速度视为零, 避免漂移
    min_x_velocity_threshold: 0.0
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.1

    # 插件列表
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    # ---- 进度检查器 ----
    # 检查机器人是否在移动, 若在规定时间内移动不足则触发恢复行为
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.6   # 最小移动半径 (米)
      movement_time_allowance: 8.0    # 超时时间 (秒)

    # ---- 目标点检查器 ----
    # 判断机器人是否到达目标点
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.6          # 位置容差 (米)
      yaw_goal_tolerance: 0.6         # 朝向容差 (弧度)
      stateful: true                  # 到达后保持"已到达"状态, 不反复切换

    # ---- Regulated Pure Pursuit 控制器 ----
    # 算法: Pure Pursuit + 曲率/障碍物速度调节 + 碰撞检测
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.33        # 目标线速度 (m/s)
      transform_tolerance: 0.1        # TF 变换容忍延时 (秒)

      # ---- 前视距离 (lookahead) ----
      lookahead_dist: 0.7             # 固定前视距离 (米)
      min_lookahead_dist: 0.6         # 动态前视距离最小值
      max_lookahead_dist: 1.0         # 动态前视距离最大值
      lookahead_time: 1.5             # 基于时间的前视: distance = velocity × time
      use_velocity_scaled_lookahead_dist: true  # 是否根据速度动态缩放前视距离

      # ---- 接近目标时的减速 ----
      min_approach_linear_velocity: 0.15         # 接近目标时允许的最低速度 (m/s)
      approach_velocity_scaling_dist: 1.5        # 从多远开始减速 (米)

      # ---- 碰撞检测 ----
      use_collision_detection: true              # 是否启用碰撞检测
      max_allowed_time_to_collision_up_to_carrot: 2.0  # 向前预测碰撞的时间窗口 (秒)

      # ---- 曲率速度调节 ----
      # 转弯越急 (曲率越大) → 速度越低
      use_regulated_linear_velocity_scaling: true   # 根据曲率缩放速度
      regulated_linear_scaling_min_radius: 0.6      # 触发速度缩放的最小转弯半径 (米)
      regulated_linear_scaling_min_speed: 0.25      # 缩放后的最低速度 (m/s)

      # ---- 障碍物距离速度调节 ----
      use_cost_regulated_linear_velocity_scaling: true  # 根据障碍物距离缩放速度
      cost_scaling_dist: 0.1       # 障碍物距离小于此值时触发减速 (米)
      cost_scaling_gain: 0.8       # 减速增益 (≤1.0, 越小减速越快)
      inflation_cost_scaling_factor: 3.0  # 代价地图膨胀层的 cost_scaling_factor (用于换算膨胀代价)

      # ---- 旋转到目标方向 ----
      use_rotate_to_heading: false             # 是否启用"原地旋转对准目标方向"行为
      rotate_to_heading_min_angle: 0.785       # 触发旋转的最小角度偏差 (弧度 ≈ 45°)
      rotate_to_heading_angular_vel: 0.4       # 旋转时的角速度 (rad/s)
      max_angular_accel: 1.0                   # 旋转时的最大角加速度 (rad/s²)

      # ---- 其他 ----
      max_robot_pose_search_dist: 3.0          # 在路径上搜索最近点的最大距离 (米)
      use_interpolation: true                  # 路径点间插值, 避免稀疏路径导致速度跳变
      goal_dist_tol: 0.08                      # 剩余距离小于此值时视为到达终点 (米)
      allow_reversing: false                   # 禁止倒车


controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False


# ---------------------------------------------------------------------------
# Local Costmap — 局部代价地图 (滚动窗口)
# 功能: 以机器人当前位置为中心的局部障碍物感知, 用于局部路径跟踪
# 坐标系: odom_combined
# ---------------------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: False
      global_frame: odom_combined
      robot_base_frame: base_footprint
      rolling_window: true         # 窗口随机器人移动而滚动
      width: 4                     # 窗口宽度 (米)
      height: 4                    # 窗口高度 (米)
      resolution: 0.05             # 分辨率 (米/像素)
      update_frequency: 10.0       # 代价地图更新频率 (Hz)
      publish_frequency: 10.0      # 发布频率 (Hz)

      robot_radius: 0.60           # 机器人半径 (米)
      # 足迹多边形: 车体轮廓 (后左, 后右, 前右, 前左)
      footprint: "[ [-0.32, -0.18], [-0.32, 0.18], [0.32, 0.18], [0.32, -0.18] ]"

      plugins: ["voxel_layer", "inflation_layer"]

      # ---- 体素层 ----
      # 基于 3D 体素的障碍物感知, 可将地面以上不同高度的激光点投影到 2D 代价地图
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0          # 体素 Z 轴起始
        z_resolution: 0.05     # Z 轴分辨率 (米)
        z_voxels: 16           # Z 轴体素数
        max_obstacle_height: 2.0   # 最大障碍物高度 (米)
        mark_threshold: 0      # 体素标记阈值

        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true        # 标记障碍物
          clearing: true       # 清除障碍物 (光线追踪)
          max_obstacle_height: 2.0   # 可检测的障碍物最大高度 (米)
          raytrace_max_range: 10.0   # 光线追踪清除的最大范围 (米)
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5    # 障碍物标记的最大范围 (米)
          obstacle_min_range: 0.1    # 障碍物标记的最小范围 (米)

      # ---- 膨胀层 ----
      # 将障碍物向外膨胀, 生成禁区
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0    # 代价衰减因子 (越大, 代价随距离衰减越快)
        inflation_radius: 0.5        # 膨胀半径 (米)

      always_send_full_costmap: false   # 每次更新发全量还是仅更新部分

  local_costmap_client:
    ros__parameters:
      use_sim_time: False
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False


# ---------------------------------------------------------------------------
# Global Costmap — 全局代价地图
# 功能: 基于全局地图的障碍物感知, 用于全局路径规划
# 坐标系: map
# ---------------------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: False
      global_frame: map
      robot_base_frame: base_footprint
      resolution: 0.2                # 分辨率 (米/像素) — 全局地图可低一些, 节省规划算力
      update_frequency: 10.0
      publish_frequency: 10.0

      robot_radius: 0.60
      footprint: "[ [-0.32, -0.18], [-0.32, 0.18], [0.32, 0.18], [0.32, -0.18] ]"
      track_unknown_space: true      # 未知区域视为不可通行

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      # ---- 静态层 ----
      # 加载预建地图
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      # ---- 障碍物层 ----
      # 实时激光障碍物
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          max_obstacle_height: 2.0
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.1

      # ---- 膨胀层 ----
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0     # 代价衰减因子
        inflation_radius: 0.4         # 膨胀半径 (米) — 比局部地图略小, 允许路径更贴近障碍物

      always_send_full_costmap: true  # 每次更新发送全量代价地图

  global_costmap_client:
    ros__parameters:
      use_sim_time: False
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False


# ---------------------------------------------------------------------------
# Map Server — 地图服务器
# 功能: 加载/保存占用网格地图
# ---------------------------------------------------------------------------
map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: "turtlebot3_world.yaml"

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0                 # 保存地图超时 (秒)
    free_thresh_default: 0.25             # 自由空间概率的上限阈值
    occupied_thresh_default: 0.65         # 占用空间概率的下限阈值
    map_subscribe_transient_local: true


# ---------------------------------------------------------------------------
# Planner Server — 全局路径规划器
# 功能: 给定起点和目标, 规划出一条全局路径
# 插件: nav2_smac_planner/SmacPlannerHybrid (Hybrid A*)
# 注: 差速机器人实际用 2D 规划器即可, Hybrid-A* 一般用于有最小转弯半径的车型
# ---------------------------------------------------------------------------
planner_server:
  ros__parameters:
    use_sim_time: False
    planner_plugins: ["GridBased"]
    expected_planner_frequency: 5.0   # 预期规划频率, 低于此值打警告 (Hz)

    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.1                  # 目标位姿容差, 无法精确到达时使用 (米)
      downsample_costmap: false       # 是否下采样代价地图加速搜索
      downsampling_factor: 1          # 下采样倍数
      allow_unknown: false            # 是否允许在未知区域中规划路径
      max_iterations: 1000000         # 最大搜索迭代次数 (-1 = 不限)
      max_on_approach_iterations: 1000    # 接近目标阶段的最大迭代次数
      max_planning_time: 7.0          # 单次规划的最大时间 (秒)

      # 运动模型:
      #   DUBIN       — 只能前进 (不能倒车)
      #   REEDS_SHEPP — 可前进可倒车
      motion_model_for_search: "REEDS_SHEPP"

      # ---- 代价相关惩罚项 ----
      cost_travel_multiplier: 2.0     # 高成本区域避让系数 (越大越远离障碍物)
      cost_penalty: 1.7               # 高成本位姿的额外惩罚

      # ---- 混合 A* 特有参数 ----
      angle_quantization_bins: 64     # 方向离散化的角度箱数 (偶数, 64 ≈ 5.6°/bin)
      analytic_expansion_ratio: 4.0   # 尝试解析扩展的频率 (越大越倾向直线连接)

      minimum_turning_radius: 0.6     # 最小转弯半径 (米), 匹配机器人实际能力
      reverse_penalty: 10.0           # 倒车惩罚 (≥1, 越大越避免倒车)
      change_penalty: 1.5             # 方向切换惩罚 (≥0, 越大越避免反复左右转)
      non_straight_penalty: 1.50      # 非直线运动惩罚 (≥1, 越大越偏好直行)
      lookup_table_size: 20.0         # Dubin/Reeds-Shepp 距离缓存窗口大小 (米)
      cache_obstacle_heuristic: true  # 缓存障碍物启发式, 加速同目标重规划 (~40×)

      # ---- 路径平滑器 ----
      smoother:
        max_iterations: 2000          # 平滑最大迭代次数
        w_smooth: 0.5                 # 平滑权重 (越大路径越平滑)
        w_data: 0.1                   # 数据保留权重 (越大越保留原始路径形状)
        tolerance: 1.0e-12            # 平滑收敛容差

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False


# ---------------------------------------------------------------------------
# Smoother Server — 路径平滑器
# 功能: 对规划出的路径做后处理平滑
# ---------------------------------------------------------------------------
smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true


# ---------------------------------------------------------------------------
# Behavior Server — 恢复行为服务器
# 功能: 导航卡住时的自恢复行为 (旋转/后退/等待)
# ---------------------------------------------------------------------------
behavior_server:
  ros__parameters:
    use_sim_time: False
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0              # 行为循环频率 (Hz)
    global_frame: odom_combined
    robot_base_frame: base_footprint
    transform_tolerance: 0.1

    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"

    simulate_ahead_time: 5.0    # 碰撞检测前向模拟时间 (秒)
    max_rotational_vel: 1.0     # 最大旋转速度 (rad/s)
    min_rotational_vel: 0.0     # 最小旋转速度 (rad/s)
    rotational_acc_lim: 0.3     # 旋转最大加速度 (rad/s²)


# ---------------------------------------------------------------------------
# Robot State Publisher — 机器人状态发布器
# 功能: 发布 robot_description 中定义的关节 TF
# ---------------------------------------------------------------------------
robot_state_publisher:
  ros__parameters:
    use_sim_time: False


# ---------------------------------------------------------------------------
# Waypoint Follower — 航点跟踪器
# 功能: 按顺序导航多个航点, 支持到达后的等待时间
# 注: 本项目中该功能由 nav2_waypoint_cycle 替代
# ---------------------------------------------------------------------------
waypoint_follower:
  ros__parameters:
    loop_rate: 20                    # 循环速率 (Hz)
    stop_on_failure: false           # 单个航点失败是否中止全部 — false 则跳过继续
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200   # 到达每个航点后的等待时间 (毫秒)
